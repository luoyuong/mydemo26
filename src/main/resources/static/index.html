<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>文本处理工具</title>
    <style>
        textarea { width: 100%; height: 200px; margin-bottom: 10px; }
        button { margin-right: 10px; }
        #result { margin-top: 10px; white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>
<h2>在线文本处理工具</h2>
<p>支持文本统计、去重、JSON格式化</p>
<textarea id="input"></textarea><br>
<button onclick="count()">统计字符数</button>
<button onclick="removeEmpty()">去空行</button>
<button onclick="removeDuplicate()">去重行</button>
<button onclick="formatJSON()">JSON格式化</button>
<button onclick="cleanAi()">AI提取重点</button>
<button onclick="toSql()">生成SQL</button>
<input id="tableName" placeholder="请输入表名"/><br/>
<input type="file" id="file">
<button onclick="upload()">上传生成sql</button>
<input id="sqlTableName" placeholder="请输入表名"/><br/>
<p>字段映射（格式：姓名:name,年龄:age）</p>
<input id="mapping" style="width:100%" />
<p id="message" style="color:green"> </p>
<div id="result"></div>

<script>
    const resultDiv = document.getElementById("result");
    const input = document.getElementById("input");
    const message = document.getElementById("message");

    function post(url, data) {
        return fetch(url, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: data
        }).then(
            response => {
                if (!response.ok){
                    throw new Error("HTTP错误:"+response.status)
                }
                return response.text();
            }
        );
    }

    function handleRequest(url,successCallback){
        if (!input.value.trim()){
            message.style.color = "red";
            message.innerText = "请输入内容!"
            return;
        }

        post(url,input.value)
            .then(res => {
                message.style.color = "black";
                message.innerText = "处理中...";
                successCallback(res);
                message.style.color = "green";
                message.innerText = "处理成功！"
            }).catch(err => {
               resultDiv.innerText = "";
               message.style.color = "red";
               message.innerText = err.message || "处理失败！"
            });


    }

    function count() {
        handleRequest("/text/count",res => {
            resultDiv.innerText = "字符数：" + res;
        })
    }

    function removeEmpty() {
        handleRequest("/text/remove-empty",res => {
            resultDiv.innerText = res
        })
    }

    function removeDuplicate() {
        handleRequest("/text/remove-duplicate",res => {
            resultDiv.innerText = res
        })
    }

    function formatJSON() {
        handleRequest("/json/format",res => {
            if (res.includes("JSON格式错误")){
                throw new Error(res);
            }
            resultDiv.innerText = res
        })
    }
    
    function cleanAi() {
        handleRequest("/ai/clean",res => {
            resultDiv.innerText = res;
        })

    }

    function toSql(){
        const table = document.getElementById("tableName").value;
        if (!table.trim()){
            message.style.color = "red";
            message.innerText = "请输入表名!"
            return;
        }

        handleRequest("/excel/to-sql?tablename="+table,res => {
            resultDiv.innerText = res;
        })

    }

    function upload(){
        const file = document.getElementById("file").files[0];
        message.innerText = ""
        if (!file){
            message.style.color = "red";
            message.innerText = "请传入文件!"
            return;
        }

        const mapping = document.getElementById("mapping").value;
        const formData = new FormData();
        formData.append("file",file);
        const tablename = document.getElementById("sqlTableName").value;
        formData.append("mapping",mapping);

        if (!tablename){
            message.style.color = "red";
            message.innerText = "请输入表名!"
            return;
        }


        fetch("/excel/sql?tablename="+tablename,{
            method: "POST",
            body : formData
        }).then(res => {
            console.log(res);
            return res.text();
        })
          .then(res => {
              resultDiv.innerText = res;
              message.style.color = "green";
              message.innerText = "生成成功!"
          })
          .catch(err => {
              message.innerText = "上传失败";
          })

    }

</script>
</body>
</html>
